<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雾中宅 · The House in the Mist</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <div id="topbar">
    <div>
      <div class="title">雾 中 宅</div>
      <div class="sub">THE HOUSE IN THE MIST</div>
    </div>
    <div class="topbtns">
      <button class="topbtn" id="btn-journal">📖 日记</button>
      <button class="topbtn" id="btn-letter">✉ 信件</button>
    </div>
  </div>

  <div id="room">
    <div id="room-img-wrap">
      <img id="room-img" src="" alt="">
      <div id="hotspots"></div>
    </div>
    <div id="room-info">
      <div id="room-name"></div>
      <div id="room-desc"></div>
      <div id="msg"></div>
      <div id="nav"></div>
    </div>
  </div>
</div>

<div id="inv-bar">
  <span class="inv-label">口 袋</span>
  <div id="inv-items"></div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal-box"></div>
</div>

<script src="game.js"></script>
</body>
</html>
